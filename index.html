<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deadlock: Competitive Encyclopedia</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Pro-Level Guides for Deadlock">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Modern Tipography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- Premium Dark Theme (Themeable) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  
  <style>
    /* Custom Premium UI/UX Overrides */
    :root {
      --theme-hue: 260;
      --theme-saturation: 80%;
      --theme-lightness: 65%;
      --theme-color: #9d72ff;
      
      --base-font-family: 'Inter', sans-serif;
      --heading-font-family: 'Outfit', sans-serif;
      
      --base-background-color: #050505;
      --sidebar-background: transparent;
      --sidebar-border-color: rgba(255, 255, 255, 0.05);
      
      --textColor: #a1a1aa;
      --heading-color: #ffffff;
      
      --cover-background-color: #030303;
      --cover-heading-color: #ffffff;
      
      --code-font-family: 'Fira Code', monospace;
      --code-theme-background: #0f0f11;
      --code-theme-text: #e2e8f0;
    }
    
    body {
      letter-spacing: -0.01em;
      background-image: radial-gradient(circle at 50% 0%, rgba(157, 114, 255, 0.05) 0%, transparent 50%);
    }

    /* Gradients on Headings (Vercel Style) */
    .markdown-section h1, .markdown-section h2, .markdown-section h3 {
      font-weight: 800;
      letter-spacing: -0.03em;
      background: -webkit-linear-gradient(45deg, #ffffff, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .markdown-section h2 { margin-top: 3rem; }

    /* Nav/Sidebar Glassmorphism */
    .app-nav {
      background: rgba(5, 5, 5, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 10px 20px;
      position: fixed;
      right: 0;
      left: 0;
      z-index: 1000;
    }

    .sidebar {
      background: rgba(10, 10, 10, 0.95) !important;
      backdrop-filter: blur(16px);
      border-right: 1px solid rgba(255,255,255,0.03);
    }
    
    /* Elite Callouts */
    .markdown-section blockquote {
      border-left: 3px solid var(--theme-color);
      background: rgba(157, 114, 255, 0.08);
      border-radius: 0 8px 8px 0;
      padding: 1rem 1.5rem;
      margin: 2em 0;
      box-shadow: inset 0 0 20px rgba(157,114,255,0.02);
    }

    /* Coverpage Action Buttons */
    .cover-main a > button {
      background: linear-gradient(135deg, var(--theme-color), #7350d6) !important;
      border-radius: 30px !important;
      color: white !important;
      font-family: 'Outfit', sans-serif !important;
      font-weight: 600 !important;
      padding: 12px 30px !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      transition: all 0.3s ease !important;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .cover-main a > button:hover {
      box-shadow: 0 0 25px rgba(157, 114, 255, 0.5) !important;
      transform: translateY(-2px) scale(1.02);
    }
    
    .cover-main a:last-child > button {
      background: transparent !important;
      border: 1px solid rgba(255,255,255,0.2) !important;
    }
    .cover-main a:last-child > button:hover {
      background: rgba(255,255,255,0.05) !important;
      box-shadow: none !important;
    }

    /* Magic Tables */
    .markdown-section table {
      border-collapse: separate;
      border-spacing: 0;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .markdown-section table th { background: rgba(255,255,255,0.02); }
  </style>
</head>
<body>
  <div id="app">System Initializing...</div>
  <script>
    window.$docsify = {
      name: 'Deadlock Pro',
      repo: '',
      loadSidebar: true,
      loadNavbar: true,
      coverpage: true,
      onlyCover: true,
      auto2top: true,
      fallbackLanguages: ['en', 'pt-br'],
      nameLink: {
        '/en/': '/en/',
        '/': '/'
      },
      search: {
        maxAge: 86400000, 
        paths: 'auto',
        placeholder: {
          '/en/': 'Search Data...',
          '/': 'Pesquisar Herói...'
        },
        noData: {
          '/en/': 'No Match!',
          '/': 'Sem Resultados!'
        },
        depth: 3
      }
    }
  </script>
  <!-- Main -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
  <!-- Plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>
</html>
